<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEPTA CCR Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary shadow-sm">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">HEPTA CCR - Call Center Reporter</span>
      </div>
    </nav>

    <main class="container py-4">
      <div class="row g-3 align-items-end mb-4">
        <div class="col-md-4">
          <label for="startDate" class="form-label">Start Date</label>
          <input type="date" id="startDate" class="form-control" />
        </div>
        <div class="col-md-4">
          <label for="endDate" class="form-label">End Date</label>
          <input type="date" id="endDate" class="form-control" />
        </div>
        <div class="col-md-4 d-flex gap-2">
          <button id="refreshBtn" class="btn btn-primary w-100">Refresh Dashboard</button>
          <button id="mockBtn" class="btn btn-outline-secondary w-100">Generate Mock Data</button>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6 col-lg-3">
          <div class="card metric-card shadow-sm">
            <div class="card-body">
              <h6 class="card-subtitle text-muted">Total Calls</h6>
              <h2 id="totalCalls" class="card-title mt-2">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-6 col-lg-3">
          <div class="card metric-card shadow-sm">
            <div class="card-body">
              <h6 class="card-subtitle text-muted">Avg Duration (sec)</h6>
              <h2 id="avgDuration" class="card-title mt-2">0</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-header">Calls per Day</div>
            <div class="card-body">
              <canvas id="callsPerDayChart" height="100"></canvas>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-header">Status Distribution</div>
            <div class="card-body">
              <canvas id="statusDistributionChart" height="180"></canvas>
            </div>
          </div>
        </div>

        <div class="col-12">
          <div class="card shadow-sm">
            <div class="card-header">Calls per Agent</div>
            <div class="card-body">
              <canvas id="callsPerAgentChart" height="90"></canvas>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
